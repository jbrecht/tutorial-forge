<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Lumen Events — Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <nav>
    <span class="brand">Lumen Events</span>
    <a href="/" class="active">Dashboard</a>
    <a href="/events">Events</a>
    <a href="/settings">Settings</a>
  </nav>
  <main>
    <h1>Dashboard</h1>
    <p class="sub">An overview of your event program.</p>
    <div class="card stat-grid">
      <div><div class="stat">12</div><div class="stat-label">Upcoming events</div></div>
      <div><div class="stat">348</div><div class="stat-label">Registrations</div></div>
      <div><div class="stat">92%</div><div class="stat-label">Attendance rate</div></div>
    </div>
    <div class="card">
      <p style="margin-bottom:14px">Ready to plan something new?</p>
      <a class="btn" href="/events">Go to events</a>
    </div>
  </main>
</body>
</html>
